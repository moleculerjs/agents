name: Typecheck

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "docs/**"
      - "examples/**"
      - "benchmark/**"
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "examples/**"
      - "benchmark/**"
      - "**.md"

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run check
